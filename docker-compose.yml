name: roadmap-platform

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-roadmap_platform}
    ports:
      # Host port defaults to 5433 so another Postgres on 5432 does not collide.
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-roadmap_platform}"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      # If Postgres logs "Permission denied" under pg_logical/, the volume has bad ownership.
      # Recreate it (wipes DB data): `./scripts/reset-postgres-docker-volume.sh` or `docker compose down -v && docker compose up -d postgres`
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

volumes:
  pgdata:
